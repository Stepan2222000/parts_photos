name: build & deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_branch:
        description: Branch to build images from and checkout on the server
        required: true
        default: main
        type: string

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.deploy_branch || 'main' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: stepan2222000
  PUBLIC_API_URL: http://194.164.245.107:3200
  # push → main; manual run → chosen branch (temporary draft deploys)
  DEPLOY_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_branch || 'main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
      deploy_branch: ${{ env.DEPLOY_BRANCH }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_BRANCH }}

      - name: Compute short SHA tag
        id: meta
        run: echo "sha_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub (for Build Cloud)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx (cloud)
        uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: "${{ secrets.DOCKERHUB_USERNAME }}/builder1"

      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          # Repo root context: api/Dockerfile pulls in ./studio_core too,
          # so the build needs both directories visible.
          context: .
          file: ./api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/parts-photos-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/parts-photos-api:${{ steps.meta.outputs.sha_tag }}

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/parts-photos-web:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/parts-photos-web:${{ steps.meta.outputs.sha_tag }}
          build-args: |
            NEXT_PUBLIC_PHOTOS_API_BASE=${{ env.PUBLIC_API_URL }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      DEPLOY_BRANCH: ${{ needs.build.outputs.deploy_branch }}
    steps:
      - name: SSH deploy on server
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_BRANCH: ${{ needs.build.outputs.deploy_branch }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DEPLOY_BRANCH
          script: |
            set -euo pipefail
            cd /root/parts_photos_app
            echo "Deploying branch: ${DEPLOY_BRANCH}"
            git fetch --quiet origin "${DEPLOY_BRANCH}"
            git reset --hard "origin/${DEPLOY_BRANCH}"
            docker compose pull
            # Apply DB migrations on every deploy (idempotent — uses
            # CREATE … IF NOT EXISTS / ADD COLUMN IF NOT EXISTS).
            for f in api/sql/migration_*.sql; do
              docker exec -i parts_photos psql -U admin -d parts_photos < "$f" || true
            done
            docker compose up -d --remove-orphans
            docker image prune -f
            docker compose ps
